<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Background ── */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #bg.loaded {
      opacity: 1;
    }

    /* ── Setup prompt (shown when no image is set) ── */
    #setup-prompt {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      color: rgba(255, 255, 255, 0.75);
    }

    #setup-prompt svg {
      opacity: 0.4;
    }

    #setup-prompt h2 {
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    #setup-btn {
      padding: 0.6rem 1.75rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(8px);
    }

    #setup-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.45);
    }

    /* ── Clock ── */
    #clock-container {
      position: fixed;
      top: 33.333%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      pointer-events: none;
      user-select: none;

      /* Glass card */
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(5px) saturate(1.4);
      -webkit-backdrop-filter: blur(5px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 2rem 3.5rem 1.75rem;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    #clock {
      font-size: 7rem;
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #date {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* ── Settings button ── */
    #settings-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s, opacity 0.2s;
      opacity: 0.5;
    }

    #settings-btn:hover {
      background: rgba(0, 0, 0, 0.45);
      color: white;
      opacity: 1;
    }

    /* ── Utilities ── */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="setup-prompt">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <h2>No wallpaper set</h2>
    <button id="setup-btn">Choose an image</button>
  </div>

  <div id="clock-container" class="hidden">
    <div id="clock"></div>
    <div id="date"></div>
  </div>

  <button id="settings-btn" title="Wallpaper settings" aria-label="Open wallpaper settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
               a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
               A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
               l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
               A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
               l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
               a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
               l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
               a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <script src="newtab.js"></script>
</body>
</html>
